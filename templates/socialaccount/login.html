{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirm Login | Hangarin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f8fafc !important; 
            color: #1e293b !important;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: #ffffff !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 32px !important;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .logo-box {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #818cf8 0%, #a855f7 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
        }

        h2 {
            font-weight: 800;
            letter-spacing: -1.2px;
            color: #1e293b;
        }

        .btn-continue {
            background: #1e293b;
            color: #fff;
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 700;
            width: 100%;
            border: none;
            margin-top: 1.5rem;
        }

        .provider-name {
            color: #818cf8;
            font-weight: 700;
            background: rgba(129, 140, 248, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-box">
            <i class="fas fa-clipboard-check"></i>
        </div>

        <h2>Confirm Sign In</h2>
        
        <p style="color: #64748b; margin-top: 1rem;">
            Authorizing <span class="provider-name">{{ provider.name }}</span> <br> 
            to access <strong>Hangarin</strong>.
        </p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn-continue">
                CONTINUE TO APP
            </button>
        </form>

        <a href="{% url 'account_login' %}" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem; display: block; margin-top: 1.5rem; font-weight: 600;">
            <i class="fas fa-arrow-left me-1"></i> Cancel
        </a>
    </div>

</body>
</html>
