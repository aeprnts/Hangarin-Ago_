{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm p-5" style="border-radius: 28px;">
                <h1 class="fw-bold mb-4" style="letter-spacing: -1px;">New Category</h1>
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Category Name</label>
                        {{ form.name }}
                        {% if form.name.errors %}
                            <div class="text-danger small mt-2">{{ form.name.errors }}</div>
                        {% endif %}
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark rounded-pill py-3 fw-bold">SAVE CATEGORY</button>
                        <a href="{% url 'category-list' %}" class="btn btn-light rounded-pill py-3 fw-bold">CANCEL</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
