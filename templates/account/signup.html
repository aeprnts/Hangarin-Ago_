{% load socialaccount %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hangarin | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #f8fafc;
      --sidebar-border: #e2e8f0;
      --text-dark: #1e293b;
      --text-muted: #64748b;
      --logo-gradient: linear-gradient(135deg, #818cf8 0%, #a855f7 100%);
    }
    body { font-family:'Inter',sans-serif; background-color:var(--bg-main); margin:0; display:flex; align-items:center; justify-content:center; min-height:100vh; color:var(--text-dark);}
    .auth-card { width:100%; max-width:400px; background:#fff; border:1px solid var(--sidebar-border); border-radius:20px; padding:2.5rem; box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);}
    .brand-wrapper { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:2rem;}
    
    /* UPDATED LOGO BOX */
    .logo-box { width:42px; height:42px; background:var(--logo-gradient); border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.25rem;}
    
    .brand-text { font-size:1.5rem; font-weight:700; color:var(--text-dark); margin:0; letter-spacing:-0.5px;}
    .form-label { font-size:0.8rem; font-weight:700; color:var(--text-dark); margin-bottom:0.4rem;}
    .form-control { background:#fff!important; border:1px solid var(--sidebar-border)!important; color:var(--text-dark)!important; border-radius:10px; padding:0.65rem 1rem; font-size:0.9rem;}
    .form-control:focus { border-color:#a855f7!important; box-shadow:0 0 0 4px rgba(168,85,247,0.1); outline:none;}
    .btn-primary-custom { background:#1e293b; color:#fff; border:none; padding:0.75rem; border-radius:10px; font-weight:700; width:100%; transition:all 0.2s; margin-top:0.5rem;}
    .btn-social { display:flex; align-items:center; justify-content:center; gap:10px; background:#fff; border:1px solid var(--sidebar-border); color:var(--text-dark); text-decoration:none; padding:0.7rem; border-radius:10px; font-size:0.9rem; font-weight:600;}
    .divider { display:flex; align-items:center; text-align:center; margin:1.25rem 0; color:var(--text-muted); font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;}
    .divider::before,.divider::after { content:''; flex:1; border-bottom:1px solid var(--sidebar-border);}
    .divider::before { margin-right:1rem;} .divider::after { margin-left:1rem;}
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="brand-wrapper">
      <div class="logo-box">
        <i class="fas fa-clipboard-check"></i>
      </div>
      <h1 class="brand-text">Hangarin</h1>
    </div>

    {% if form.errors %}
        <div class="alert alert-danger">
            {{ form.errors }}
        </div>
    {% endif %}

    <a href="{% provider_login_url 'google' %}" class="btn-social w-100 mb-3">
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="16"> Continue with Google
    </a>

    <div class="divider">or use email</div>

    <form method="post" action="{% url 'account_signup' %}" autocomplete="off">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required autocomplete="new-password">
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="name@email.com" required autocomplete="new-password">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password1" class="form-control" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="password2" class="form-control" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn-primary-custom">Create Account</button>
    </form>

    <p class="mt-3 small text-center text-muted">
      Already have an account? <a href="{% url 'account_login' %}" style="color:#a855f7; font-weight:700; text-decoration:none;">Sign in here</a>
    </p>
  </div>
</body>
</html>
